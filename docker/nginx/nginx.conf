# ── 限流区（定义在 http 块，server 块内引用）────────────────────
# 登录接口：每 IP 每秒 1 次，突发 5 次（对应 slowapi 10/minute）
limit_req_zone $binary_remote_addr zone=login:10m rate=1r/s;
# 注册接口：每 IP 每分钟 1 次（对应 slowapi 5/hour）
limit_req_zone $binary_remote_addr zone=register:10m rate=1r/m;

server {
    listen 80;
    server_name _;

    # 允许上传最大 600MB（音色 ZIP 包，留余量）
    client_max_body_size 600M;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # 静态资源缓存（哈希文件名，长期缓存）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 登录接口：Nginx 层限流（双重防护）
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 注册接口：Nginx 层限流
    location = /api/auth/register {
        limit_req zone=register burst=2 nodelay;
        limit_req_status 429;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # API 请求反向代理到后端
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;  # 长超时（TTS 合成可能较慢）
    }

    # WebSocket 代理（关键配置）
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;  # WebSocket 长连接，24小时不超时
        proxy_send_timeout 86400s;
    }

    # SPA 路由：所有未匹配路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
