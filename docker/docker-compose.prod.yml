# 生产环境覆盖配置
# 使用方式：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# 必须在宿主机 .env 中设置的变量：
#   POSTGRES_PASSWORD   数据库强密码
#   REDIS_PASSWORD      Redis 认证密码
#   JWT_SECRET_KEY      JWT 签名密钥（≥32字符随机串）

services:
  backend:
    restart: always
    environment:
      WHISPER_DEVICE: cuda
      # Redis 生产地址（含密码认证）
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      # 可选：生产域名跨域白名单（逗号分隔）
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      # 上传大小限制（MB），默认 500
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-500}
    command: >
      sh -c "
        cd /app &&
        alembic -c backend/alembic/alembic.ini upgrade head &&
        uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 1
      "
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  frontend:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  postgres:
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # 生产环境必须设置强密码
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
