name: voice-chat
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - nodejs>=20
  - pip
  # CUDA & PyTorch（RTX 5060 / Blackwell sm_120，cu128 兼容）
  - pytorch::pytorch=2.7.*
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=12.8
  - pip:
    # ── Web 框架 ──
    - fastapi>=0.111.0
    - uvicorn[standard]>=0.30.0
    - websockets>=12.0
    - python-multipart>=0.0.9
    # ── 数据库 ──
    - sqlalchemy>=2.0
    - alembic>=1.13
    - psycopg2-binary>=2.9
    - asyncpg>=0.29
    # ── 缓存 ──
    - redis>=5.0
    # ── 认证 ──
    - python-jose[cryptography]>=3.3
    - passlib[bcrypt]>=1.7
    # ── 配置 ──
    - pydantic>=2.7
    - pydantic-settings>=2.3
    - python-dotenv>=1.0
    # ── STT ──
    - faster-whisper>=1.0
    # ── 音频处理 ──
    - ffmpeg-python>=0.2
    - soundfile>=0.12
    - numpy>=1.26
    # ── LLM ──
    - openai>=1.30
    # ── 工具 ──
    - huggingface_hub>=0.23
    - httpx>=0.27
    - aiofiles>=23.2
    - loguru>=0.7
    - tenacity>=8.3
